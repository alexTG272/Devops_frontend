apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 745505531953.dkr.ecr.us-east-1.amazonaws.com/eksfrontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
